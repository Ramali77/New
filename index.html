<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панорама 360°</title>

    <!-- Подключаем Pannellum из CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        /* Убираем отступы, чтобы панорама занимала весь экран */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #panorama {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Контейнер для панорамы -->
    <div id="panorama"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Теперь используется локальный файл 1.jpg в той же папке
            const imageUrl = '1.jpg';   // или './1.jpg'

            // Инициализация панорамы
            const viewer = pannellum.viewer('panorama', {
                type: 'equirectangular',           // Тип панорамы
                panorama: imageUrl,                // Ссылка на изображение
                autoLoad: true,                    // Автоматическая загрузка
                showZoomCtrl: true,                // Кнопки зума
                showFullscreenCtrl: true,          // Кнопка полноэкранного режима
                compass: true,                     // Показывать компас
                hotSpotDebug: false,
                draggable: true,
                mouseZoom: true,
                keyboardZoom: true,
                friction: 0.95,
                yaw: 0,                            // Начальный угол обзора (горизонталь)
                pitch: 0,                          // Начальный угол обзора (вертикаль)
                hfov: 100,                         // Начальное поле зрения (в градусах)
                minHfov: 30,
                maxHfov: 120,
                minPitch: -90,
                maxPitch: 90,
            });

            // Обработчик ошибки загрузки изображения
            viewer.on('error', function(err) {
                console.error('Ошибка загрузки панорамы:', err);
                alert('Не удалось загрузить панорамное изображение. Убедитесь, что файл 1.jpg лежит рядом с HTML-страницей.');
            });

            // Обработчик успешной загрузки
            viewer.on('load', function() {
                console.log('Панорама успешно загружена!');
            });
        });
    </script>

</body>
</html>
